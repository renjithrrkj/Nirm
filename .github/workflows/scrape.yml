name: NirmAI Daily Scraper

on:
  # Run daily at 1:30 AM IST (UTC+5:30 = 20:00 UTC)
  schedule:
    - cron: '0 20 * * *'
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      scrapers:
        description: 'Which scrapers to run (space-separated: pmgsy etenders iroads)'
        required: false
        default: 'pmgsy etenders iroads'
      dry_run:
        description: 'Dry run (no DB writes)'
        type: boolean
        required: false
        default: false

jobs:
  scrape:
    name: Scrape Government Portals
    runs-on: ubuntu-latest
    timeout-minutes: 30

    defaults:
      run:
        working-directory: scraper

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run scrapers
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          SCRAPERS="${{ github.event.inputs.scrapers || 'pmgsy etenders iroads' }}"
          DRY_RUN="${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}"
          python run_all.py --scrapers $SCRAPERS $DRY_RUN

      - name: Upload scrape log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-log-${{ github.run_id }}
          path: scraper/scrape_*.log
          retention-days: 7
